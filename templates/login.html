<!DOCTYPE html>
<html>
<head>
    <title>Đăng Nhập</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 300px;
            padding: 20px;
            border: 1px solid white;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            background: black;
            color: white;
            border: 1px solid white;
        }

        button {
            width: 100%;
            padding: 8px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
        }

        a {
            color: white;
            display: block;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Đăng Nhập</h2>
    <form method="post">
        <input type="text" name="username" placeholder="Tài khoản" required>
        <input type="password" name="password" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button>
    </form>

    <a href="/register">Đăng ký</a>
</div>

</body>
  </html>
