<!DOCTYPE html>
<html>
<head>
    <title>Đăng Ký</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 320px;
            padding: 20px;
            border: 1px solid white;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            background: black;
            color: white;
            border: 1px solid white;
        }

        label {
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        a {
            color: white;
            display: block;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Đăng Ký</h2>
    <form method="post">
        <input type="text" name="username" placeholder="Tên đăng ký" required>
        <input type="password" name="password" placeholder="Mật khẩu" required>
        <input type="password" name="confirm" placeholder="Xác nhận mật khẩu" required>
        <input type="text" name="phone" placeholder="Số điện thoại (chỉ giám sát)">

        <label>
            <input type="checkbox" name="agree"> Xác nhận quy định
        </label>

        <button type="submit">Tạo tài khoản</button>
    </form>

    <a href="/">Quay lại đăng nhập</a>
</div>

</body>
</html>
