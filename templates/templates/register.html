<!DOCTYPE html>
<html>
<head>
    <title>Đăng Ký</title>
    <style>
        body {
            background: black;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            width: 280px; /* nhỏ gọn hơn */
            padding: 18px;
            border: 1px solid white;
            border-radius: 10px;
        }

        input {
            width: 100%;
            padding: 6px;
            margin: 5px 0;
            background: black;
            color: white;
            border: 1px solid white;
            font-size: 13px;
        }

        .error {
            color: red;
            font-size: 12px;
            margin-top: -3px;
            margin-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 7px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            margin-top: 8px;
        }

        label {
            font-size: 13px;
        }

        a {
            color: white;
            display: block;
            margin-top: 8px;
            text-align: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="box">
    <h3>Đăng Ký</h3>
    <form method="post">
        <input type="text" name="username" placeholder="Tên đăng ký" required>

        <input type="password" name="password" placeholder="Mật khẩu" required>

        <input type="password" name="confirm" placeholder="Xác nhận mật khẩu" required>
        {% if error_pw %}
            <div class="error">{{ error_pw }}</div>
        {% endif %}

        <input type="text" name="phone" placeholder="Số điện thoại">

        <label>
            <input type="checkbox" name="agree"> Xác nhận quy định
        </label>
        {% if error_agree %}
            <div class="error">{{ error_agree }}</div>
        {% endif %}

        <button type="submit">Tạo tài khoản</button>
    </form>

    <a href="/">Quay lại</a>
</div>

</body>
</html>
