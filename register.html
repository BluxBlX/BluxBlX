<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h2>Đăng ký</h2>
  <p class="sub-title">Tạo tài khoản mới để bắt đầu</p>

  <form>
    <div class="input-box">
      <input type="text" placeholder="Tên đăng nhập" required>
    </div>

    <div class="otp-row">
      <input type="text" placeholder="Số điện thoại">
      <button type="button" class="otp-btn">Gửi mã</button>
    </div>

    <div class="otp-row">
      <input type="text" placeholder="Email">
      <button type="button" class="otp-btn">Gửi mã</button>
    </div>

    <div class="input-box">
      <input type="text" placeholder="Nhập mã OTP">
    </div>

    <div class="input-box">
      <input type="password" placeholder="Mật khẩu" required>
    </div>

    <div class="input-box">
      <input type="password" placeholder="Xác nhận mật khẩu" required>
    </div>

    <div class="input-box">
      <input type="text" placeholder="Mã bí mật hệ thống">
    </div>

    <button class="btn">Đăng ký</button>
  </form>

  <p class="link-text">
    Đã có tài khoản? <a href="index.html">Đăng nhập</a>
  </p>

</div>

</body>
</html>
